<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Smart Translator | Smart Translator</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="header-content">
                <div class="brand">
                    <span class="brand-icon">🚀</span>
                    <div class="brand-text">
                        <h1> Smart Translator</h1>
                        <span class="developer-tag">تم البرمجة بواسطة <span class="dev-name"><Kbd>Khalifa Abd
                                    ELFattah</Kbd></span></span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="theme-toggle-btn" title="تبديل الوضع">🌙</button>
                    <button id="clearBtn" class="secondary-btn">مسح المحتوى</button>
                </div>
            </div>
        </header>

        <main class="translator-container">
            <div class="translation-card">
                <!-- Source Section -->
                <div class="pane source-pane">
                    <div class="pane-header">
                        <select id="sourceLang">
                            <option value="en" selected>الإنجليزية</option>
                            <option value="ar">العربية</option>
                            <option value="fr">الفرنسية</option>
                            <option value="de">الألمانية</option>
                            <option value="es">الإسبانية</option>
                            <option value="ko">الكورية</option>
                        </select>
                        <div class="char-counter"><span id="charCount">0</span> / 5000</div>
                    </div>
                    <div class="textarea-wrapper">
                        <textarea id="inputText" placeholder="أدخل النص هنا..."></textarea>
                    </div>
                </div>

                <!-- Divider / Swap -->
                <div class="divider">
                    <button id="swapLangs" title="تبديل">⇌</button>
                </div>

                <!-- Target Section -->
                <div class="pane target-pane">
                    <div class="pane-header">
                        <select id="targetLang">
                            <option value="ar">العربية</option>
                            <option value="en">الإنجليزية</option>
                            <option value="fr">الفرنسية</option>
                            <option value="de">الألمانية</option>
                            <option value="es">الإسبانية</option>
                            <option value="ko">الكورية</option>
                        </select>
                        <div class="action-group">
                            <button id="speakBtn" class="icon-btn" title="استماع">🔊</button>
                            <button id="copyBtn" class="icon-btn" title="نسخ">📋</button>
                        </div>
                    </div>
                    <div class="textarea-wrapper">
                        <textarea id="outputText" placeholder="الترجمة..." readonly></textarea>
                        <div id="loading" class="spinner-overlay">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="translate-action">
                <button id="translateBtn" class="primary-btn">
                    <span>ترجم الآن</span>
                    <span class="btn-icon">⚡</span>
                </button>
                <div class="designer-signature">Designed by Khalifa Abdelfattah</div>
            </div>
        </main>

        <footer class="app-footer">
            <p>© 2026 - Smart Translator </p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
